<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="theme-color"
      content="#f9f9f9"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#131313"
      media="(prefers-color-scheme: dark)"
    />
    <title>kg-mann-calculator</title>
  </head>
  <body>
    <noscript>
      <h2>Enable JavaScript</h2>
    </noscript>
    <div id="browser-error" style="display: none">
      <h2>Browser Not Supported</h2>
      <p>Please use a modern browser</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/classic/main.jsx"></script>
    <script>
      var root = document.getElementById("root")
      var browserError = document.getElementById("browser-error")
      window.addEventListener("error", function (e) {
        if (root.children.length) return
        if (e.message.match(/module/i)) return
        const stack = e.error && e.error.stack
        if (!("" + e.filename + stack).match(/legacy.{10}js/i)) return
        browserError.style.display = "block"
      })
    </script>
  </body>
</html>
